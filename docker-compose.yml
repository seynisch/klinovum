version: "3.8"

services:
  klinovum:
    image: nginx:alpine
    restart: always
    volumes:
      - ./landingpage:/usr/share/nginx/html:ro
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.klinovum.rule=Host(`klinovum.de`) || Host(`www.klinovum.de`)"
      - "traefik.http.routers.klinovum.tls.certresolver=letsencrypt"
      - "traefik.http.services.klinovum.loadbalancer.server.port=80"

networks:
  n8n_default:
    external: true
