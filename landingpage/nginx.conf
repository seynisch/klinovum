server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        application/rss+xml
        application/wasm
        font/ttf
        font/otf
        image/svg+xml;

    # Long-cache hashed-style assets (images, fonts, svg)
    location ~* \.(?:webp|avif|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log off;
        try_files $uri =404;
    }

    # Short-cache for CSS/JS so deploys are picked up quickly while still caching
    location ~* \.(?:css|js)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
        try_files $uri =404;
    }

    # JSON / XML / TXT — small, cache modestly
    location ~* \.(?:json|xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }

    # HTML — never aggressively cache, allow revalidation
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA-ish fallback for the single landing page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security/perf headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
